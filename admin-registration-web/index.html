<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Registration Portal</title>
    <style>
      :root {
        --bg: #f8fafc;
        --card: #ffffff;
        --text: #0f172a;
        --muted: #475569;
        --border: #e2e8f0;
        --danger: #dc2626;
        --danger-dark: #b91c1c;
        --ok: #065f46;
      }
      body {
        margin: 0;
        font-family: Segoe UI, Arial, sans-serif;
        background: linear-gradient(#f8fafc, #ffffff);
        color: var(--text);
      }
      .wrap {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
      }
      .card {
        width: 100%;
        max-width: 520px;
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 14px;
        padding: 28px;
        box-shadow: 0 10px 24px rgba(15, 23, 42, 0.06);
      }
      h1 {
        margin: 0 0 8px;
        font-size: 28px;
      }
      p {
        margin: 0 0 14px;
        color: var(--muted);
      }
      label {
        display: block;
        font-weight: 600;
        margin: 12px 0 6px;
        font-size: 14px;
      }
      input {
        width: 100%;
        box-sizing: border-box;
        padding: 10px 12px;
        border: 1px solid #cbd5e1;
        border-radius: 8px;
        font-size: 14px;
      }
      input:focus {
        outline: none;
        border-color: #ef4444;
        box-shadow: 0 0 0 3px rgba(239, 68, 68, 0.15);
      }
      .row {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 12px;
      }
      .alert {
        border-radius: 8px;
        padding: 10px 12px;
        font-size: 14px;
        margin-top: 10px;
        display: none;
      }
      .alert.err {
        display: block;
        background: #fee2e2;
        color: #991b1b;
        border: 1px solid #fecaca;
      }
      .alert.ok {
        display: block;
        background: #dcfce7;
        color: var(--ok);
        border: 1px solid #bbf7d0;
      }
      button {
        margin-top: 16px;
        width: 100%;
        border: 0;
        border-radius: 8px;
        background: var(--danger);
        color: #fff;
        font-weight: 600;
        font-size: 15px;
        padding: 11px 14px;
        cursor: pointer;
      }
      button:hover { background: var(--danger-dark); }
      button:disabled { opacity: 0.6; cursor: not-allowed; }
      .small {
        margin-top: 14px;
        font-size: 12px;
      }
      .small a { color: #b91c1c; }
      @media (max-width: 540px) {
        .row { grid-template-columns: 1fr; }
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="card">
        <h1>Admin Registration</h1>
        <p>Dedicated portal for creating admin accounts for Task Hive.</p>

        <form id="adminForm">
          <label for="baseUrl">Main app URL</label>
          <input id="baseUrl" value="http://localhost:3000" />

          <label for="name">Full Name</label>
          <input id="name" required />

          <div class="row">
            <div>
              <label for="username">Username</label>
              <input id="username" required minlength="3" />
            </div>
            <div>
              <label for="phone">Phone (optional)</label>
              <input id="phone" />
            </div>
          </div>

          <div class="row">
            <div>
              <label for="password">Password</label>
              <input id="password" type="password" required minlength="8" />
            </div>
            <div>
              <label for="confirmPassword">Confirm Password</label>
              <input id="confirmPassword" type="password" required minlength="8" />
            </div>
          </div>

          <label for="adminCode">Admin Registration Code</label>
          <input id="adminCode" type="password" required />

          <div id="alert" class="alert"></div>
          <button id="submitBtn" type="submit">Create Admin Account</button>
        </form>

        <p class="small">
          After success, login from the main app login form.
          <a id="loginLink" href="http://localhost:3000/login" target="_blank" rel="noopener noreferrer">Open Login</a>
        </p>
      </div>
    </div>

    <script>
      const form = document.getElementById("adminForm");
      const alertBox = document.getElementById("alert");
      const submitBtn = document.getElementById("submitBtn");
      const loginLink = document.getElementById("loginLink");

      function setAlert(message, isError) {
        alertBox.className = "alert " + (isError ? "err" : "ok");
        alertBox.textContent = message;
      }

      form.addEventListener("submit", async (e) => {
        e.preventDefault();
        alertBox.className = "alert";
        alertBox.textContent = "";

        const baseUrl = document.getElementById("baseUrl").value.trim().replace(/\/+$/, "");
        const name = document.getElementById("name").value.trim();
        const username = document.getElementById("username").value.trim();
        const phone = document.getElementById("phone").value.trim();
        const password = document.getElementById("password").value;
        const confirmPassword = document.getElementById("confirmPassword").value;
        const adminCode = document.getElementById("adminCode").value;

        loginLink.href = baseUrl + "/login";

        if (password !== confirmPassword) {
          setAlert("Passwords do not match.", true);
          return;
        }

        submitBtn.disabled = true;
        submitBtn.textContent = "Creating...";
        try {
          const res = await fetch(baseUrl + "/api/auth/signup", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              name,
              username,
              phone: phone || null,
              password,
              role: "ADMIN",
              adminCode
            })
          });

          const data = await res.json().catch(() => ({}));
          if (!res.ok) {
            setAlert(data.error || "Failed to create admin account.", true);
            return;
          }

          form.reset();
          document.getElementById("baseUrl").value = baseUrl;
          setAlert("Admin account created. Use the main app login form to sign in.", false);
        } catch {
          setAlert("Could not reach the main app. Check the URL and ensure it is running.", true);
        } finally {
          submitBtn.disabled = false;
          submitBtn.textContent = "Create Admin Account";
        }
      });
    </script>
  </body>
</html>
