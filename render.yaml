services:
  - type: web
    name: campus-gigs
    env: node
    plan: free
    buildCommand: npm install && npx prisma generate && npx prisma db push --skip-generate --accept-data-loss && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: NEXTAUTH_SECRET
        sync: false
      - key: NEXTAUTH_URL
        sync: false
      - key: ADMIN_REGISTRATION_CODE
        sync: false
